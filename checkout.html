<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الدفع</title>

<style>
body{background:#0a0a0f;color:white;text-align:center;font-family:Arial;}
.box{background:#111;padding:20px;border-radius:15px;width:300px;margin:auto;}
input,button{width:90%;padding:10px;margin:10px;}
</style>

</head>

<body>

<div class="box">
<h2>💳 الدفع</h2>

<p>01012345678</p>

<input id="amount" placeholder="المبلغ">
<input type="file" id="proof">

<button onclick="finishPayment()">تم الدفع</button>
</div>

<script>

function finishPayment(){

    let amount = document.getElementById("amount").value;
    let file = document.getElementById("proof").files[0];
    let playerId = localStorage.getItem("playerId");
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if(!amount || !file || cart.length === 0){
        alert("كمل البيانات ❗");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(){

        fetch("http://localhost:3000/order", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                playerId,
                items: cart,
                amount,
                proof: reader.result,
                status:"⏳ قيد المراجعة",
                date:new Date().toLocaleString()
            })
        })
        .then(()=>{
            alert("تم إرسال الطلب ✅");
            localStorage.removeItem("cart");
            window.location.href="index.html";
        });
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
