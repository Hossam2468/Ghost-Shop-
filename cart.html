<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>سلة التسوق</title>

<style>
body{
    background:black;
    color:white;
    font-family:Arial;
    margin:0;
}

h1{
    text-align:center;
    margin:30px;
    text-shadow: 0 0 10px #8e44ad;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #8e44ad; }
    to { text-shadow: 0 0 20px #c084fc; }
}

.cart-container{
    width:80%;
    margin:auto;
}

.item{
    background:#111;
    padding:15px;
    margin:10px 0;
    border:1px solid #8e44ad;
    border-radius:10px;
    display:flex;
    align-items:center;
    gap:15px;
    justify-content:space-between;
    transition:0.3s;
}

.item:hover{
    transform: scale(1.03);
    box-shadow: 0 0 15px #8e44ad;
}

.item img{
    width:70px;
    height:70px;
    object-fit:cover;
    border-radius:10px;
}

.item-info{
    flex:1;
    text-align:right;
}

button{
    background:#8e44ad;
    border:none;
    padding:8px 15px;
    color:white;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform: scale(1.05);
    box-shadow:0 0 10px #8e44ad;
}

.total{
    text-align:center;
    font-size:22px;
    margin-top:20px;
}

input{
    padding:10px;
    width:250px;
    border:1px solid #8e44ad;
    background:black;
    color:white;
    text-align:center;
}

.center{
    text-align:center;
    margin-top:20px;
}

.empty{
    text-align:center;
    margin-top:40px;
    font-size:18px;
    color:#aaa;
}
</style>

</head>

<body>

<h1>🛒 سلة التسوق</h1>

<div class="cart-container" id="cart-items"></div>
<div class="total" id="total"></div>

<div class="center">
    <input type="text" id="playerId" placeholder="ادخل ID اللاعب">
</div>

<div class="center">
    <button onclick="goToCheckout()">اشحن الآن</button>
</div>

<div class="center">
    <button onclick="clearCart()">مسح السلة</button>
</div>

<script>

// تحميل السلة
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// عرض السلة
function displayCart(){
    let container = document.getElementById("cart-items");
    let totalBox = document.getElementById("total");

    container.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        container.innerHTML = `<div class="empty">السلة فارغة 😢</div>`;
        totalBox.innerHTML = "";
        return;
    }

    cart.forEach((item,index) => {
        total += item.price;

        container.innerHTML += `
        <div class="item">
            <img src="${item.img}" onerror="this.src='default.png'">
            <div class="item-info">
                <p>${item.name}</p>
                <p>${item.price} جنيه</p>
            </div>
            <button onclick="removeItem(${index})">❌</button>
        </div>
        `;
    });

    totalBox.innerHTML = `الإجمالي: ${total} جنيه`;
}

// حذف منتج
function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

// مسح السلة
function clearCart(){
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

// الذهاب للدفع
function goToCheckout(){
    if(cart.length === 0){
        alert("السلة فاضية ❌");
        return;
    }

    let playerId = document.getElementById("playerId").value;

    if(playerId === ""){
        alert("ادخل ID اللاعب ❗");
        return;
    }

    // حفظ ID فقط
    localStorage.setItem("playerId", playerId);

    // ❌ متسجلش طلب هنا
    // ❌ متحذفش السلة هنا

    window.location.href = "checkout.html";
}

// تشغيل
displayCart();

</script>

<div class="center" style="color:#aaa; font-size:14px;">
🚀 سيتم تنفيذ الطلب خلال دقائق بعد التأكيد
</div>

</body>
</html>
